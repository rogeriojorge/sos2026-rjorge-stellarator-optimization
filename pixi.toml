[project]
name = "sos2026-stellarator-optimization"
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64", "linux-64"]

[tasks]
smoke = "python scripts/run_smoke_tests.py"
figures = "python scripts/generate_all_figures.py"
movies = "python scripts/generate_movies.py"
notebooks = "python scripts/execute_notebooks_core.py"
test = "pytest -q"

[dependencies]
python = ">=3.10"
numpy = "*"
scipy = "*"
matplotlib = "*"
pandas = "*"
xarray = "*"
netcdf4 = "*"
h5py = "*"
jupyterlab = "*"
ipykernel = "*"
ipywidgets = "*"
plotly = "*"
imageio = "*"
tqdm = "*"
nbformat = "*"
nbconvert = "*"
pytest = "*"
